<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ludo Star</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar glass-card">
      <div>
        <p class="eyebrow">Classic board game / modern experience</p>
        <h1>Ludo Star</h1>
      </div>
      <div class="header-actions">
        <button id="modeSingle" class="mode-button active">Single Player</button>
        <button id="modeLocal" class="mode-button">Local Multiplayer</button>
        <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">🌙</button>
      </div>
    </header>

    <main class="layout-grid">
      <section class="panel board-panel glass-card">
        <div class="section-title">
          <h2>Game Board</h2>
          <span>Click tokens to move after a roll</span>
        </div>
        <div class="board-frame">
          <canvas id="ludoCanvas"></canvas>
          <div class="dice-overlay">
            <div id="diceFace" class="dice-face">-</div>
          </div>
        </div>
      </section>

      <aside class="panel side-panel">
        <section class="glass-card control-panel">
          <div class="section-title">
            <h2>Dice & Controls</h2>
          </div>
          <div class="control-grid">
            <button id="rollButton" class="action-button">Roll Dice</button>
            <button id="restartButton" class="action-button secondary">Restart Game</button>
          </div>
          <div class="turn-info glass-card small-card">
            <p class="small-label">Active Player</p>
            <div id="activePlayer" class="player-chip active">Red</div>
            <p class="small-label">Turn timer</p>
            <div class="timer-bar"><span id="timerFill"></span></div>
            <p id="turnTimer" class="timer-label">20s</p>
          </div>
          <div class="dice-log glass-card small-card">
            <p class="small-label">Last Roll</p>
            <div id="diceLog">Roll to begin</div>
          </div>
        </section>

        <section class="glass-card status-panel">
          <div class="section-title">
            <h2>Player Status</h2>
          </div>
          <div id="playerStatus" class="status-grid"></div>
        </section>

        <section class="glass-card info-panel">
          <div class="section-title">
            <h2>Game Info</h2>
          </div>
          <div class="info-block">
            <div class="info-row"><span>Mode</span><strong id="gameMode">Single Player</strong></div>
            <div class="info-row"><span>Turn</span><strong id="turnCount">1</strong></div>
            <div class="info-row"><span>Scoreboard</span><strong id="scoreBoard">Red 0 / Green 0 / Yellow 0 / Blue 0</strong></div>
          </div>
          <div class="logs glass-card small-card">
            <p class="small-label">Message Feed</p>
            <div id="logFeed" class="log-feed"></div>
          </div>
        </section>
      </aside>
    </main>

    <div id="confettiLayer" class="confetti-layer hidden"></div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
