<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.board{
    width:600px;
    height:600px;
    border:4px solid #000;
    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);
    background:white;
}

.cell{
    border:1px solid #ddd;
}

.red-home{
    background:red;
}

.green-home{
    background:green;
}

.yellow-home{
    background:gold;
}

.blue-home{
    background:royalblue;
}

.path{
    background:#eee;
}

.token{
    width:24px;
    height:24px;
    border-radius:50%;
    margin:auto;
}

.red-token{
    background:red;
}

.green-token{
    background:green;
}

.yellow-token{
    background:gold;
}

.blue-token{
    background:royalblue;
}

.controls{
    margin-top:20px;
    text-align:center;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

.info{
    margin-top:10px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>Ludo Game</h1>

<div class="board" id="board"></div>

<div class="controls">
    <button onclick="rollDice()">Roll Dice</button>
    <div class="info" id="info">Red's Turn</div>
</div>

<script>
const board = document.getElementById("board");

for(let i=0;i<225;i++){
    const cell=document.createElement("div");
    cell.classList.add("cell");
    board.appendChild(cell);
}

const cells=document.querySelectorAll(".cell");

const path=[
6,7,8,23,38,53,68,83,98,113,
128,143,158,173,188,189,190,
175,160,145,130,115,100,85,
70,55,40,25,10
];

const players=[
    {name:"Red",color:"red-token",pos:0},
    {name:"Green",color:"green-token",pos:0},
    {name:"Yellow",color:"yellow-token",pos:0},
    {name:"Blue",color:"blue-token",pos:0}
];

let currentPlayer=0;

function render(){
    cells.forEach(c=>c.innerHTML="");

    players.forEach(player=>{
        const token=document.createElement("div");
        token.classList.add("token");
        token.classList.add(player.color);

        const cellIndex=path[player.pos % path.length];
        cells[cellIndex].appendChild(token);
    });
}

function rollDice(){
    let dice=Math.floor(Math.random()*6)+1;

    players[currentPlayer].pos+=dice;

    document.getElementById("info").innerHTML=
        players[currentPlayer].name +
        " rolled " + dice;

    currentPlayer++;

    if(currentPlayer>=players.length){
        currentPlayer=0;
    }

    setTimeout(()=>{
        document.getElementById("info").innerHTML=
            players[currentPlayer].name + "'s Turn";
    },1000);

    render();
}

render();
</script>

</body>
</html>
